version: "3.9"

services:
  db:
    image: postgres:16
    container_name: tsj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tsj_user
      POSTGRES_PASSWORD: tsj_pass
      POSTGRES_DB: tsj_mental_health
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: tsj_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://tsj_user:tsj_pass@db:5432/tsj_mental_health
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  db_data:
